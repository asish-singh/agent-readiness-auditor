name: Release

# On a version tag, this workflow:
#   1. publishes the package to npm (the primary registry),
#   2. creates a GitHub Release, and
#   3. publishes a scoped mirror to GitHub Packages.
# Requires an NPM_TOKEN secret (a granular npm token) for step 1.
# GitHub Packages uses the built-in token, so no extra secret is needed.
# Typical flow:
#   npm version patch    # bumps package.json and creates the git tag
#   git push --follow-tags

on:
  push:
    tags:
      - "v*"

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write # allows creating the GitHub Release
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  github-packages:
    runs-on: ubuntu-latest
    needs: npm
    permissions:
      contents: read
      packages: write # allows publishing to GitHub Packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://npm.pkg.github.com"
          scope: "@asish-singh"
      - run: npm ci
      - run: npm run build
      - name: Publish scoped mirror to GitHub Packages
        # GitHub Packages requires the name to be scoped to the owner. Rename
        # only for this publish; package.json on disk is not committed back.
        run: |
          npm pkg set name=@asish-singh/agent-readiness-auditor
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

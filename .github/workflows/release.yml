name: Release

# Publishes to npm when you push a version tag (e.g. v0.1.1).
# Requires an NPM_TOKEN secret (Automation token from npmjs.com) in the repo.
# Typical flow:
#   npm version patch   # bumps package.json + creates the git tag
#   git push --follow-tags

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

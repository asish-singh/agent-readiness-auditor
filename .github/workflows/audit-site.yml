name: Audit live site

# Audits a target site on a schedule and on demand. Fails (exit 2) if a hard
# safety check (for example, hidden prompt injection) is detected on the live page.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "URL or domain to audit"
        required: true
        default: "freeyoutubetranscribe.com"
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run agent-readiness audit
        # Exit codes: 0 = clean, 2 = hard safety failure (must fail the job),
        # 1 = unreachable or other (infrastructure, not a safety issue: warn, do not fail).
        # Cloudflare-protected sites often 403 datacenter IPs like CI runners.
        run: |
          set +e
          node dist/index.js "${{ github.event.inputs.target || 'freeyoutubetranscribe.com' }}"
          code=$?
          if [ "$code" -eq 2 ]; then
            echo "::error::Hard safety failure detected in the audited site."
            exit 2
          elif [ "$code" -ne 0 ]; then
            echo "::warning::Could not complete the audit (exit $code). The site is likely unreachable from CI, for example due to bot protection. Not treating this as a safety failure."
            exit 0
          fi

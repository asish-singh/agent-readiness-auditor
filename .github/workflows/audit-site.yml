name: Audit live site

# Audits a target site on a schedule and on demand, using this repo's own
# GitHub Action (dogfooding). Fails if a hard safety check (for example,
# hidden prompt injection) is detected on the live page.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "URL or domain to audit"
        required: true
        default: "freeyoutubetranscribe.com"
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run agent readiness audit
        uses: ./
        with:
          url: ${{ github.event.inputs.target || 'freeyoutubetranscribe.com' }}
          fail-on: safety
